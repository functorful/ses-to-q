name: Build & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: "graalce"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew --build-cache build

      - name: Build native Docker image
        if: github.event_name == 'push'
        env:
          DOCKER_IMAGE_REPO: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DOCKER_IMAGE_TAG: ${{ github.ref_type == 'tag' && format('v{0}', github.ref_name) || format('sha-{0}', github.sha) }}
        run: ./gradlew --build-cache optimizedDockerBuildNative

      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.event_name == 'push'
        env:
          TAG: ${{ github.ref_type == 'tag' && format('v{0}', github.ref_name) || format('sha-{0}', github.sha) }}
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}
